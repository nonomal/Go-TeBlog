<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>编辑文章 - Go-TeBlog</title>
    <link rel="stylesheet" href="/blog/usr/themes/default/css/font-awesome.min.css">
    <link rel="stylesheet" href="/blog/usr/themes/default/vditor/dist/index.css">
    <style>
        body {
            font-family: sans-serif;
            margin: 0;
            display: flex;
            background: #f3f4f6;
        }

        .sidebar {
            width: 240px;
            background: #2d3436;
            color: #dfe6e9;
            height: 100vh;
            padding: 30px 20px;
            box-shadow: 2px 0 10px rgba(0, 0, 0, 0.1);
            z-index: 10;
            position: fixed;
            left: 0;
            top: 0;
            box-sizing: border-box;
        }

        .sidebar h3 {
            color: #fff;
            margin-bottom: 30px;
            font-size: 1.2em;
            letter-spacing: 1px;
            padding-left: 10px;
        }

        .sidebar a {
            display: block;
            padding: 12px 15px;
            color: #b2bec3;
            text-decoration: none;
            border-radius: 6px;
            margin-bottom: 5px;
            transition: all 0.3s;
            font-size: 14px;
        }

        .nav-label {
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #636e72;
            margin: 20px 0 10px 10px;
        }

        .sidebar-divider {
            height: 1px;
            background: rgba(255, 255, 255, 0.05);
            margin: 10px 0;
        }

        .sidebar a:hover {
            color: #fff;
            background: rgba(255, 255, 255, 0.05);
        }

        .sidebar a.active {
            background: #0984e3;
            color: white;
            box-shadow: 0 4px 6px rgba(9, 132, 227, 0.2);
        }

        .sidebar a i {
            margin-right: 10px;
            width: 18px;
            text-align: center;
        }

        .content {
            flex: 1;
            padding: 40px;
            display: flex;
            background: #f8fafc;
            margin-left: 240px;
            min-height: 100vh;
            box-sizing: border-box;
            padding-top: 85px;
        }

        .top-bar {
            position: fixed;
            top: 0;
            left: 240px;
            right: 0;
            height: 55px;
            background: #fff;
            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.05);
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding: 0 40px;
            z-index: 5;
        }

        .user-menu {
            position: relative;
            cursor: pointer;
            padding: 10px;
            display: flex;
            align-items: center;
            gap: 8px;
            border-radius: 4px;
            transition: background 0.2s;
            font-size: 14px;
            color: #4b5563;
        }

        .user-menu:hover {
            background: #f3f4f6;
        }

        .user-menu .dropdown {
            position: absolute;
            top: 100%;
            margin-top: 5px;
            left: 0;
            background: #fff;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            border: 1px solid #e5e7eb;
            border-radius: 6px;
            min-width: 120px;
            display: none;
            flex-direction: column;
            padding: 5px 0;
            z-index: 100;
        }

        /* Bridge to keep dropdown open when mouse is between trigger and dropdown */
        .user-menu .dropdown::before {
            content: '';
            position: absolute;
            top: -15px;
            left: 0;
            right: 0;
            height: 15px;
        }

        .user-menu.open .dropdown {
            display: flex;
        }

        .dropdown a {
            padding: 10px 15px;
            text-decoration: none !important;
            color: #4b5563 !important;
            font-size: 14px;
            transition: background 0.2s;
            background: none !important;
            box-shadow: none !important;
            display: block !important;
            margin-bottom: 0 !important;
        }

        .dropdown a:hover {
            background: #f9fafb !important;
            color: #111827 !important;
        }

        .main-edit {
            width: 100%;
            max-width: 900px;
            margin: 0 auto;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .editor-heading {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
        }

        .editor-heading label {
            margin-bottom: 0;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }

        input[type="text"] {
            width: 100%;
            padding: 15px;
            border: 1px solid #d1d5db;
            border-radius: 4px;
            box-sizing: border-box;
            font-size: 16px;
        }

        .editor-source {
            display: none;
        }

        #editor {
            background: #fff;
        }

        #editor .vditor {
            border-color: #d1d5db;
            border-radius: 4px;
        }

        #editor .vditor-toolbar {
            border-radius: 4px 4px 0 0;
        }

        #editor .vditor-content {
            min-height: 360px;
        }

        #editor .vditor-wysiwyg > .vditor-reset {
            padding: 10px 20px !important;
        }

        .edit-actions {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 8px;
        }

        .edit-actions button {
            width: 34px;
            min-height: 34px;
            padding: 0;
            color: #64748b;
            border: 1px solid #cbd5e1;
            border-radius: 4px;
            background: #fff;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            white-space: nowrap;
            transition: border-color 0.2s, color 0.2s, background 0.2s;
        }

        .edit-actions .action-tip {
            display: block;
        }

        .edit-actions button i {
            margin-right: 0;
        }

        .edit-actions button:not(:disabled):hover {
            border-color: #0984e3;
            color: #0984e3;
            background: #f0f7ff;
        }

        .edit-actions .attachment-trigger {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 34px;
            min-height: 34px;
            padding: 0;
            border: 1px solid #cbd5e1;
            border-radius: 4px;
            background: #fff;
            color: #64748b;
            cursor: pointer;
        }

        .edit-actions .attachment-trigger:hover {
            border-color: #0984e3;
            color: #0984e3;
            background: #f0f7ff;
        }

        .btn-ai-proofread:disabled {
            background: #f8fafc;
            border-color: #e2e8f0;
            color: #94a3b8;
            cursor: not-allowed;
            opacity: 0.72;
        }

        .ai-proofread-status {
            display: none;
            margin: 8px 0 0;
            padding: 8px 10px;
            border-radius: 4px;
            background: #eff6ff;
            color: #1d4ed8;
            font-size: 12px;
            line-height: 1.5;
        }

        .ai-proofread-status.error {
            background: #fef2f2;
            color: #dc2626;
        }

        .preview-layer-mask {
            position: fixed;
            inset: 0;
            background: rgba(15, 23, 42, 0.34);
            display: none;
            z-index: 900;
        }

        .attachment-layer-mask {
            position: fixed;
            inset: 0;
            background: rgba(15, 23, 42, 0.34);
            display: none;
            z-index: 900;
        }

        .preview-layer {
            position: fixed;
            left: 50%;
            top: 52%;
            transform: translate(-50%, -50%);
            width: min(920px, calc(100vw - 48px));
            max-height: min(760px, calc(100vh - 72px));
            background: #fff;
            border: 1px solid #dbe4ea;
            border-radius: 8px;
            box-shadow: 0 24px 60px rgba(15, 23, 42, 0.24);
            display: none;
            z-index: 901;
            overflow: hidden;
        }

        .attachment-layer {
            position: fixed;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            width: min(520px, calc(100vw - 48px));
            max-height: min(620px, calc(100vh - 72px));
            background: #fff;
            border: 1px solid #dbe4ea;
            border-radius: 8px;
            box-shadow: 0 24px 60px rgba(15, 23, 42, 0.24);
            display: none;
            z-index: 901;
            overflow: hidden;
        }

        .preview-layer-header {
            height: 48px;
            padding: 0 16px;
            border-bottom: 1px solid #e2e8f0;
            display: flex;
            align-items: center;
            justify-content: space-between;
            color: #334155;
            font-weight: 600;
        }

        .attachment-layer-header {
            height: 48px;
            padding: 0 16px;
            border-bottom: 1px solid #e2e8f0;
            display: flex;
            align-items: center;
            justify-content: space-between;
            color: #334155;
            font-weight: 600;
        }

        .preview-layer-close {
            width: 30px;
            height: 30px;
            border: 1px solid #dbe4ea;
            border-radius: 7px;
            background: #f8fafc;
            color: #64748b;
            cursor: pointer;
        }

        .attachment-layer-close {
            width: 30px;
            height: 30px;
            border: 1px solid #dbe4ea;
            border-radius: 7px;
            background: #f8fafc;
            color: #64748b;
            cursor: pointer;
        }

        .preview-layer-body {
            padding: 20px;
            max-height: calc(min(760px, calc(100vh - 72px)) - 49px);
            overflow: auto;
            color: #1e293b;
            line-height: 1.8;
            font-size: 15px;
        }

        .attachment-layer-body {
            padding: 16px 20px 20px;
            max-height: calc(min(620px, calc(100vh - 72px)) - 49px);
            overflow: auto;
        }

        .attachment-preview {
            position: fixed;
            display: none;
            z-index: 902;
            width: 220px;
            max-height: 180px;
            padding: 5px;
            border: 1px solid #dbe4ea;
            border-radius: 6px;
            background: #fff;
            box-shadow: 0 10px 28px rgba(15, 23, 42, 0.16);
            pointer-events: none;
        }

        .attachment-preview img {
            display: block;
            width: 100%;
            max-height: 170px;
            object-fit: contain;
            border-radius: 3px;
        }

        .preview-layer-body img,
        .preview-layer-body video {
            max-width: 100%;
            height: auto;
            border-radius: 6px;
        }

        .preview-layer-body pre {
            overflow: auto;
            padding: 12px;
            border-radius: 6px;
            background: #f1f5f9;
        }

        .preview-layer-body blockquote {
            margin: 1em 0;
            padding-left: 14px;
            border-left: 4px solid #cbd5e1;
            color: #475569;
        }

        .preview-layer-body a {
            color: #0984e3;
        }

        .preview-layer-body .admin-preview-title {
            margin: 0 0 18px;
            padding-bottom: 14px;
            border-bottom: 1px solid #e2e8f0;
            color: #0f172a;
            font-size: 28px;
            line-height: 1.35;
        }

        .attachment-list {
            list-style: none;
            padding: 0;
            margin-top: 15px;
            border-top: 1px solid #eee;
            max-height: min(420px, calc(100vh - 220px));
            overflow-y: auto;
            padding-right: 4px;
        }

        .attachment-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #f9f9f9;
            font-size: 13px;
            transition: all 0.3s ease;
        }

        .attachment-item span {
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            max-width: 130px;
            cursor: pointer;
            color: #3b82f6;
        }

        .btn-del-att {
            color: #ef4444;
            width: 28px;
            height: 28px;
            border: 1px solid #fecaca;
            border-radius: 4px;
            background: #fff;
            cursor: pointer;
            font-size: 12px;
        }

        .btn-del-att:hover {
            background: #fef2f2;
            border-color: #fca5a5;
        }

        .attachment-delete-mask {
            position: fixed;
            inset: 0;
            display: none;
            z-index: 903;
            background: rgba(15, 23, 42, 0.34);
        }

        .attachment-delete-layer {
            position: fixed;
            left: 50%;
            top: 50%;
            display: none;
            z-index: 904;
            width: min(360px, calc(100vw - 48px));
            transform: translate(-50%, -50%);
            padding: 20px;
            border: 1px solid #dbe4ea;
            border-radius: 8px;
            background: #fff;
            box-shadow: 0 24px 60px rgba(15, 23, 42, 0.24);
        }

        .attachment-delete-layer h3 {
            margin: 0;
            color: #1e293b;
            font-size: 16px;
        }

        .attachment-delete-layer p {
            margin: 10px 0 0;
            color: #64748b;
            font-size: 13px;
            line-height: 1.6;
        }

        .attachment-delete-message {
            display: none;
            margin-top: 10px;
            color: #dc2626;
            font-size: 12px;
        }

        .attachment-delete-actions {
            display: flex;
            justify-content: flex-end;
            gap: 8px;
            margin-top: 18px;
        }

        .attachment-delete-actions button {
            min-height: 32px;
            padding: 0 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
        }

        .attachment-delete-cancel {
            border: 1px solid #cbd5e1;
            background: #fff;
            color: #475569;
        }

        .attachment-delete-confirm {
            border: 1px solid #dc2626;
            background: #dc2626;
            color: #fff;
        }

        .attachment-delete-confirm:disabled {
            cursor: not-allowed;
            opacity: 0.7;
        }

        .upload-hint {
            font-size: 12px;
            color: #666;
            background: #fef3c7;
            padding: 8px;
            border-radius: 4px;
            margin-bottom: 10px;
        }

        .toast {
            position: fixed;
            top: 20px;
            right: 20px;
            background: #10b981;
            color: white;
            padding: 12px 24px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            transform: translateY(-100px);
            transition: transform 0.3s ease;
            z-index: 1000;
        }

        .toast.show {
            transform: translateY(0);
        }

        .typecho-more-note {
            margin: 4px 0 8px;
            font-size: 11px;
            color: #94a3b8;
            line-height: 1.6;
        }

        .typecho-more-note code {
            padding: 1px 4px;
            border-radius: 3px;
            background: #f1f5f9;
            color: #64748b;
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
        }
    </style>
</head>

<body>
    <div id="toast" class="toast">保存成功！</div>
        {{template "admin_sidebar" .}}
    {{template "admin_topbar" .}}

    <div class="content">
        <div class="main-edit">
            <form action="{{adminPath}}/save" method="POST" id="post-form">
                <input type="hidden" name="cid" id="post-cid" value="{{.Post.Cid}}">
                <div class="form-group">
                    <label>标题</label>
                    <input type="text" name="title" id="post-title" value="{{.Post.Title}}" required placeholder="输入文章标题">
                </div>
                <div class="form-group">
                    <label>缩略名 (Slug)</label>
                    <input type="text" name="slug" value="{{.Post.Slug}}" placeholder="post-slug (留空则自动生成)">
                </div>
                <div class="form-group">
                    <label>分类</label>
                    <div style="background: #fff; padding: 10px; border: 1px solid #d1d5db; border-radius: 4px;">
                        {{range .Categories}}
                        <label style="display: inline-block; margin-right: 15px; font-weight: normal; cursor: pointer;">
                            <input type="checkbox" name="categories" value="{{.Mid}}" {{if .Selected}}checked{{end}}>
                            {{.Name}}
                        </label>
                        {{else}}
                        <span style="color: #999; font-size: 13px;">暂无分类</span>
                        {{end}}
                    </div>
                </div>
                <div class="form-group">
                    <div class="editor-heading">
                        <label>正文（支持粘贴图片）</label>
                        <div class="edit-actions">
                            <button type="button" class="btn-save" title="保存" aria-label="保存" onclick="document.getElementById('post-form').submit()"><i class="fas fa-save"></i></button>
                            <button type="button" class="btn-preview" id="previewBtn" title="预览" aria-label="预览"><i class="fas fa-eye"></i></button>
                            <span class="action-tip" title="{{if not .AiProofreadEnabled}}请先到系统设置中配置 AI 系统：AI API URL、AI Model 和 AI API Key{{else}}使用 AI 整理当前编辑框内容{{end}}">
                                <button type="button" class="btn-ai-proofread" id="aiProofreadBtn" title="校稿" aria-label="校稿" {{if not .AiProofreadEnabled}}disabled{{end}}><i class="fas fa-spell-check"></i></button>
                            </span>
                            <button type="button" class="attachment-trigger" id="attachmentTrigger" title="附件管理" aria-label="附件管理" aria-expanded="false">
                                <i class="fas fa-paperclip"></i>
                            </button>
                        </div>
                    </div>
                    <div class="ai-proofread-status" id="aiProofreadStatus"></div>
                    <div class="typecho-more-note">
                        需要在列表页截断正文时，在分隔位置输入 <code>&lt;!--more--&gt;</code>
                    </div>
                    <textarea id="editor-source" class="editor-source">{{.Post.Text}}</textarea>
                    <input type="hidden" name="text" id="post-content">
                    <div id="editor"></div>
                </div>
            </form>
        </div>
    </div>
    <div id="previewLayerMask" class="preview-layer-mask"></div>
    <div id="previewLayer" class="preview-layer">
        <div class="preview-layer-header">
            <span>实时预览</span>
            <button type="button" class="preview-layer-close" id="previewCloseBtn" title="关闭" aria-label="关闭">
                <i class="fas fa-times"></i>
            </button>
        </div>
        <div id="previewLayerBody" class="preview-layer-body"></div>
    </div>
    <div id="attachmentLayerMask" class="attachment-layer-mask"></div>
    <div id="attachmentLayer" class="attachment-layer" role="dialog" aria-modal="true" aria-label="附件管理">
        <div class="attachment-layer-header">
            <span>附件管理</span>
            <button type="button" class="attachment-layer-close" id="attachmentLayerClose" title="关闭" aria-label="关闭">
                <i class="fas fa-times"></i>
            </button>
        </div>
        <div class="attachment-layer-body">
            <div class="upload-hint">直接在正文中粘贴图片或拖入图片即可上传。</div>
            <ul class="attachment-list" id="attachment-list">
                {{range .Attachments}}
                <li class="attachment-item" data-path="{{.Path}}">
                    <span onclick="insertAtCursor('![]({{.Path}})')" data-preview-path="{{.Path}}" title="点击插入">{{.Title}}</span>
                    <button type="button" class="btn-del-att" title="删除附件" aria-label="删除附件"
                        onclick="deleteAttachment('{{.Cid}}', '{{.Path}}', this)"><i class="fas fa-trash-alt"></i></button>
                </li>
                {{else}}
                <li class="attachment-empty" style="font-size: 12px; color: #999; padding: 10px 0;">暂无附件</li>
                {{end}}
            </ul>
        </div>
    </div>
    <div class="attachment-preview" id="attachmentPreview"><img alt="附件预览"></div>
    <div class="attachment-delete-mask" id="attachmentDeleteMask"></div>
    <div class="attachment-delete-layer" id="attachmentDeleteLayer" role="dialog" aria-modal="true" aria-labelledby="attachmentDeleteTitle">
        <h3 id="attachmentDeleteTitle">删除附件</h3>
        <p>删除后会同时移除正文中的图片引用，此操作无法撤销。</p>
        <div class="attachment-delete-message" id="attachmentDeleteMessage"></div>
        <div class="attachment-delete-actions">
            <button type="button" class="attachment-delete-cancel" id="attachmentDeleteCancel">取消</button>
            <button type="button" class="attachment-delete-confirm" id="attachmentDeleteConfirm">确认删除</button>
        </div>
    </div>

    <script src="/blog/usr/themes/default/vditor/dist/index.min.js"></script>
    <script>
        const editorSource = document.getElementById('editor-source');
        const postContent = document.getElementById('post-content');
        const postForm = document.getElementById('post-form');
        const postTitle = document.getElementById('post-title');
        const postCid = document.getElementById('post-cid').value;
        const previewBtn = document.getElementById('previewBtn');
        const previewLayer = document.getElementById('previewLayer');
        const previewLayerMask = document.getElementById('previewLayerMask');
        const previewLayerBody = document.getElementById('previewLayerBody');
        const previewCloseBtn = document.getElementById('previewCloseBtn');
        const attachmentTrigger = document.getElementById('attachmentTrigger');
        const attachmentLayer = document.getElementById('attachmentLayer');
        const attachmentLayerMask = document.getElementById('attachmentLayerMask');
        const attachmentLayerClose = document.getElementById('attachmentLayerClose');
        const attachmentPreview = document.getElementById('attachmentPreview');
        const attachmentPreviewImage = attachmentPreview.querySelector('img');
        const attachmentDeleteMask = document.getElementById('attachmentDeleteMask');
        const attachmentDeleteLayer = document.getElementById('attachmentDeleteLayer');
        const attachmentDeleteMessage = document.getElementById('attachmentDeleteMessage');
        const attachmentDeleteCancel = document.getElementById('attachmentDeleteCancel');
        const attachmentDeleteConfirm = document.getElementById('attachmentDeleteConfirm');
        const aiProofreadBtn = document.getElementById('aiProofreadBtn');
        const aiProofreadStatus = document.getElementById('aiProofreadStatus');
        let previewTimer = null;
        let previewRequestId = 0;
        let previewOpen = false;
        let pendingAttachmentDelete = null;
        let editor;

        function getEditorValue() {
            return editor ? editor.getValue() : editorSource.value;
        }

        function setEditorValue(value) {
            if (editor) {
                editor.setValue(value || '');
            } else {
                editorSource.value = value || '';
            }
            postContent.value = value || '';
        }

        function syncEditorValue() {
            postContent.value = getEditorValue();
        }

        function openPreviewLayer() {
            previewOpen = true;
            previewLayer.style.display = 'block';
            previewLayerMask.style.display = 'block';
            renderEditorPreview();
        }

        function closePreviewLayer() {
            previewOpen = false;
            previewLayer.style.display = 'none';
            previewLayerMask.style.display = 'none';
        }

        function openAttachmentLayer() {
            attachmentLayer.style.display = 'block';
            attachmentLayerMask.style.display = 'block';
            attachmentTrigger.setAttribute('aria-expanded', 'true');
        }

        function closeAttachmentLayer() {
            attachmentLayer.style.display = 'none';
            attachmentLayerMask.style.display = 'none';
            attachmentTrigger.setAttribute('aria-expanded', 'false');
        }

        function scheduleEditorPreview() {
            if (!previewOpen) return;
            clearTimeout(previewTimer);
            previewTimer = setTimeout(renderEditorPreview, 300);
        }

        function renderEditorPreview() {
            if (!previewOpen) return;

            const requestId = ++previewRequestId;
            const formData = new FormData();
            formData.append('title', postTitle.value);
            formData.append('text', getEditorValue());
            previewLayerBody.innerHTML = '<p>预览生成中...</p>';

            fetch('{{adminPath}}/post/preview', {
                method: 'POST',
                body: formData
            })
                .then(response => response.json())
                .then(data => {
                    if (requestId !== previewRequestId) return;
                    previewLayerBody.innerHTML = data.success ? data.html : '<p>' + (data.message || '预览生成失败') + '</p>';
                })
                .catch(() => {
                    if (requestId === previewRequestId) {
                        previewLayerBody.innerHTML = '<p>预览生成失败</p>';
                    }
                });
        }

        previewBtn.addEventListener('click', openPreviewLayer);
        previewCloseBtn.addEventListener('click', closePreviewLayer);
        previewLayerMask.addEventListener('click', closePreviewLayer);
        attachmentTrigger.addEventListener('click', openAttachmentLayer);
        attachmentLayerClose.addEventListener('click', closeAttachmentLayer);
        attachmentLayerMask.addEventListener('click', closeAttachmentLayer);
        attachmentDeleteCancel.addEventListener('click', closeAttachmentDeleteLayer);
        attachmentDeleteMask.addEventListener('click', closeAttachmentDeleteLayer);
        attachmentDeleteConfirm.addEventListener('click', confirmAttachmentDelete);
        postTitle.addEventListener('input', scheduleEditorPreview);
        postForm.addEventListener('submit', syncEditorValue);

        function setAIProofreadStatus(message, isError) {
            aiProofreadStatus.textContent = message || '';
            aiProofreadStatus.className = 'ai-proofread-status' + (isError ? ' error' : '');
            aiProofreadStatus.style.display = message ? 'block' : 'none';
        }

        if (aiProofreadBtn && !aiProofreadBtn.disabled) {
            aiProofreadBtn.addEventListener('click', function () {
                const text = getEditorValue();
                if (!text.trim()) {
                    setAIProofreadStatus('请先输入文章内容。', true);
                    return;
                }

                aiProofreadBtn.disabled = true;
                aiProofreadBtn.title = '校稿中';
                aiProofreadBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>';
                setAIProofreadStatus('AI 正在整理当前编辑框内容，请稍候。', false);

                const formData = new FormData();
                formData.append('text', text);

                fetch('{{adminPath}}/post/ai-proofread', {
                    method: 'POST',
                    headers: {
                        'Accept': 'application/json',
                        'X-Requested-With': 'XMLHttpRequest'
                    },
                    body: formData
                })
                    .then(async response => {
                        const data = await response.json().catch(() => ({}));
                        if (!response.ok || !data.success) {
                            throw new Error(data.message || 'AI 校稿失败');
                        }
                        return data;
                    })
                    .then(data => {
                        setEditorValue(data.text || '');
                        scheduleEditorPreview();
                        setAIProofreadStatus('校稿完成，已替换当前编辑框内容。', false);
                    })
                    .catch(err => {
                        setAIProofreadStatus(err.message || 'AI 校稿失败', true);
                    })
                    .finally(() => {
                        aiProofreadBtn.disabled = false;
                        aiProofreadBtn.title = '校稿';
                        aiProofreadBtn.innerHTML = '<i class="fas fa-spell-check"></i>';
                    });
            });
        }

        document.addEventListener('keydown', function (event) {
            if (event.key === 'Escape') {
                if (previewOpen) closePreviewLayer();
                if (attachmentLayer.style.display === 'block') closeAttachmentLayer();
                if (attachmentDeleteLayer.style.display === 'block') closeAttachmentDeleteLayer();
            }
        });

        function insertAtCursor(text) {
            editor.insertMD(text);
            syncEditorValue();
            scheduleEditorPreview();
        }

        function appendUploadedAttachment(url, cid) {
            const list = document.getElementById('attachment-list');
            if (!list || list.querySelector(`[data-path="${CSS.escape(url)}"]`)) return;

            const emptyItem = list.querySelector('.attachment-empty');
            if (emptyItem) emptyItem.remove();

            const item = document.createElement('li');
            item.className = 'attachment-item';
            item.dataset.path = url;
            const name = document.createElement('span');
            name.textContent = url.split('/').pop();
            name.title = '点击插入';
            name.dataset.previewPath = url;
            name.addEventListener('click', () => insertAtCursor(`![](${url})`));
            bindAttachmentPreview(name, url);
            const remove = document.createElement('button');
            remove.type = 'button';
            remove.className = 'btn-del-att';
            remove.title = '删除附件';
            remove.setAttribute('aria-label', '删除附件');
            remove.innerHTML = '<i class="fas fa-trash-alt"></i>';
            remove.addEventListener('click', () => deleteAttachment(cid, url, remove));
            item.append(name, remove);
            list.appendChild(item);
        }

        function isPreviewableImage(path) {
            return /\.(apng|avif|bmp|gif|ico|jpe?g|png|svg|webp)(?:[?#].*)?$/i.test(path);
        }

        function positionAttachmentPreview(event) {
            const offset = 14;
            let left = event.clientX + offset;
            let top = event.clientY + offset;
            const previewWidth = attachmentPreview.offsetWidth || 230;
            const previewHeight = attachmentPreview.offsetHeight || 190;

            if (left + previewWidth > window.innerWidth - 12) left = event.clientX - previewWidth - offset;
            if (top + previewHeight > window.innerHeight - 12) top = window.innerHeight - previewHeight - 12;

            attachmentPreview.style.left = `${Math.max(12, left)}px`;
            attachmentPreview.style.top = `${Math.max(12, top)}px`;
        }

        function bindAttachmentPreview(element, path) {
            if (!isPreviewableImage(path)) return;

            element.addEventListener('mouseenter', event => {
                attachmentPreviewImage.src = path;
                attachmentPreview.style.display = 'block';
                positionAttachmentPreview(event);
            });
            element.addEventListener('mousemove', positionAttachmentPreview);
            element.addEventListener('mouseleave', () => {
                attachmentPreview.style.display = 'none';
                attachmentPreviewImage.removeAttribute('src');
            });
        }

        document.querySelectorAll('[data-preview-path]').forEach(element => {
            bindAttachmentPreview(element, element.dataset.previewPath);
        });

        function deleteAttachment(cid, path, btn) {
            pendingAttachmentDelete = { cid, path, btn };
            attachmentDeleteMessage.textContent = '';
            attachmentDeleteMessage.style.display = 'none';
            attachmentDeleteConfirm.disabled = false;
            attachmentDeleteConfirm.textContent = '确认删除';
            attachmentDeleteLayer.style.display = 'block';
            attachmentDeleteMask.style.display = 'block';
        }

        function closeAttachmentDeleteLayer() {
            pendingAttachmentDelete = null;
            attachmentDeleteLayer.style.display = 'none';
            attachmentDeleteMask.style.display = 'none';
        }

        function confirmAttachmentDelete() {
            if (!pendingAttachmentDelete) return;

            const { cid, path, btn } = pendingAttachmentDelete;
            attachmentDeleteConfirm.disabled = true;
            attachmentDeleteConfirm.textContent = '删除中...';
            attachmentDeleteMessage.style.display = 'none';

            const url = `{{adminPath}}/attachment/delete/${cid}?parent=${postCid}`;
            fetch(url, { method: 'POST' })
                .then(res => {
                    if (!res.ok && !res.redirected) throw new Error('删除失败，请稍后重试。');

                    const escapedPath = path.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
                    const regex = new RegExp('!\\s*\\[.*?\\]\\(' + escapedPath + '\\)', 'g');
                    setEditorValue(getEditorValue().replace(regex, ''));
                    scheduleEditorPreview();

                    const item = btn.closest('.attachment-item');
                    item.style.opacity = '0';
                    item.style.transform = 'translateX(20px)';
                    closeAttachmentDeleteLayer();
                    setTimeout(() => {
                        item.remove();
                        const list = document.getElementById('attachment-list');
                        if (list.querySelectorAll('.attachment-item').length === 0) {
                            list.innerHTML = '<li class="attachment-empty" style="font-size: 12px; color: #999; padding: 10px 0;">暂无附件</li>';
                        }
                    }, 300);
                })
                .catch(err => {
                    console.error(err);
                    attachmentDeleteMessage.textContent = err.message || '删除失败，请稍后重试。';
                    attachmentDeleteMessage.style.display = 'block';
                    attachmentDeleteConfirm.disabled = false;
                    attachmentDeleteConfirm.textContent = '确认删除';
                });
        }

        window.onload = function () {
            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.get('msg') === 'saved') {
                const toast = document.getElementById('toast');
                toast.classList.add('show');
                setTimeout(() => {
                    toast.classList.remove('show');
                    window.history.replaceState({}, document.title, window.location.pathname);
                }, 3000);
            }
        }

        editor = new Vditor('editor', {
            cdn: '/blog/usr/themes/default/vditor',
            lang: 'zh_CN',
            mode: 'wysiwyg',
            minHeight: 360,
            placeholder: '在这里输入内容...',
            cache: {
                enable: false
            },
            resize: {
                enable: true,
                position: 'bottom'
            },
            toolbar: [
                'emoji', 'headings', 'bold', 'italic', 'strike', '|',
                'line', 'quote', 'list', 'ordered-list', 'check', 'outdent', 'indent', '|',
                'code', 'inline-code', 'link', 'table', '|',
                'upload', 'undo', 'redo', '|', 'edit-mode', 'fullscreen'
            ],
            upload: {
                multiple: false,
                handler(files) {
                    const file = files[0];
                    if (!file) return '未获取到上传文件';

                    const formData = new FormData();
                    formData.append('editormd-image-file', file);
                    formData.append('cid', postCid);

                    return fetch('{{adminPath}}/upload', {
                        method: 'POST',
                        body: formData
                    })
                        .then(async response => {
                            const data = await response.json().catch(() => ({}));
                            if (!response.ok || !data.success || !data.url) {
                                throw new Error(data.message || '上传失败');
                            }
                            return data;
                        })
                        .then(data => {
                            const name = file.name.replace(/[\[\]]/g, '\\$&');
                            editor.insertMD(`![${name}](${data.url})`);
                            appendUploadedAttachment(data.url, data.cid);
                            syncEditorValue();
                            scheduleEditorPreview();
                            return null;
                        })
                        .catch(error => error.message || '上传出错');
                }
            },
            input(value) {
                postContent.value = value;
                scheduleEditorPreview();
            },
            after() {
                syncEditorValue();
            },
            value: editorSource.value
        });
    </script>
<script>
document.addEventListener('DOMContentLoaded', function () {
  const userMenu = document.querySelector('.user-menu');
  if (userMenu) {
    userMenu.addEventListener('click', function (e) {
      e.stopPropagation();
      userMenu.classList.toggle('open');
    });
    document.addEventListener('click', function () {
      userMenu.classList.remove('open');
    });
  }
});
</script>
</body>

</html>
