<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>后台登录</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background:
                radial-gradient(circle at 50% 0%, rgba(9, 132, 227, 0.16), transparent 32%),
                linear-gradient(180deg, #f7fafc 0%, #eaf1f6 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 40px 20px;
            color: #2d3436;
        }

        .login-box {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(14px);
            padding: 42px 40px 38px;
            border-radius: 20px;
            box-shadow: 0 28px 52px -22px rgba(45, 52, 54, 0.28), 0 12px 24px -12px rgba(45, 52, 54, 0.16), 0 0 0 1px rgba(255, 255, 255, 0.72) inset;
            border: 1px solid rgba(148, 163, 184, 0.18);
            width: 420px;
            max-width: 100%;
        }

        .login-brand {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin: 0 0 12px;
            color: #0984e3;
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 0.12em;
        }

        .login-brand-mark {
            display: grid;
            width: 30px;
            height: 30px;
            place-items: center;
            border-radius: 9px;
            background: #0984e3;
            box-shadow: 0 8px 16px rgba(9, 132, 227, 0.24);
        }

        h2 {
            text-align: center;
            color: #2d3436;
            font-size: 28px;
            font-weight: 700;
            line-height: 1.2;
            letter-spacing: -0.03em;
            margin: 0 0 8px;
        }

        .login-subtitle {
            margin: 0 0 30px;
            color: #7c8796;
            font-size: 14px;
            line-height: 1.6;
            text-align: center;
        }

        input {
            width: 100%;
            height: 52px;
            padding: 0 15px 0 43px;
            margin: 0 0 15px;
            border: 1px solid #d9e1ea;
            border-radius: 12px;
            background-color: rgba(248, 250, 252, 0.72);
            background-position: 15px 50%;
            background-repeat: no-repeat;
            background-size: 16px 16px;
            color: #2d3436;
            font-size: 15px;
            outline: none;
            transition: border-color 0.2s ease, box-shadow 0.2s ease, background-color 0.2s ease;
        }

        input[name="username"] {
            background-image: url("data:image/svg+xml,%3Csvg width='16' height='16' viewBox='0 0 24 24' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M20 21a8 8 0 0 0-16 0' stroke='%2394A3B8' stroke-width='1.8' stroke-linecap='round'/%3E%3Ccircle cx='12' cy='7' r='4' stroke='%2394A3B8' stroke-width='1.8'/%3E%3C/svg%3E");
        }

        input[name="password"] {
            background-image: url("data:image/svg+xml,%3Csvg width='16' height='16' viewBox='0 0 24 24' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Crect x='5' y='10' width='14' height='10' rx='2' stroke='%2394A3B8' stroke-width='1.8'/%3E%3Cpath d='M8 10V7a4 4 0 0 1 8 0v3' stroke='%2394A3B8' stroke-width='1.8' stroke-linecap='round'/%3E%3Cpath d='M12 14v2' stroke='%2394A3B8' stroke-width='1.8' stroke-linecap='round'/%3E%3C/svg%3E");
        }

        .two-factor-modal {
            position: fixed;
            z-index: 10;
            inset: 0;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
            background: rgba(45, 52, 54, 0.48);
            backdrop-filter: blur(4px);
        }

        .two-factor-modal.active { display: flex; }

        .two-factor-dialog {
            width: 360px;
            max-width: 100%;
            padding: 28px;
            border: 1px solid rgba(148, 163, 184, 0.22);
            border-radius: 18px;
            background: #fff;
            box-shadow: 0 24px 50px rgba(45, 52, 54, 0.25);
        }

        .two-factor-dialog h3 { margin: 0 0 8px; color: #2d3436; font-size: 20px; }
        .two-factor-dialog p { margin: 0 0 20px; color: #64748b; font-size: 14px; line-height: 1.6; }

        .two-factor-error {
            display: none;
            margin: 0 0 16px;
            padding: 10px 12px;
            border: 1px solid #fecdd3;
            border-radius: 10px;
            background: #fff1f2;
            color: #be123c;
            font-size: 13px;
        }

        .two-factor-code {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 8px;
            margin: 0 0 15px;
        }

        .two-factor-code .two-factor-digit {
            width: 100%;
            height: 52px;
            min-width: 0;
            margin: 0;
            padding: 0;
            text-align: center;
            font-size: 22px;
            font-weight: 600;
            letter-spacing: 0;
        }

        .two-factor-actions { display: block; }
        .two-factor-actions button { margin: 0; }

        .two-factor-cancel { background: #f1f5f9; color: #475569; box-shadow: none; }
        .two-factor-cancel:hover { background: #e2e8f0; color: #2d3436; box-shadow: none; }

        input:focus {
            background-color: #fff;
            border-color: #0984e3;
            box-shadow: 0 0 0 4px rgba(9, 132, 227, 0.1);
        }

        input::placeholder {
            color: #94a3b8;
        }

        button {
            width: 100%;
            height: 50px;
            margin-top: 7px;
            background: linear-gradient(180deg, #1688df 0%, #0876cc 100%);
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-size: 15px;
            font-weight: 600;
            transition: background 0.2s ease, transform 0.2s ease, box-shadow 0.2s ease, opacity 0.2s ease;
            box-shadow: 0 10px 18px rgba(9, 132, 227, 0.18);
        }

        button:hover {
            background: linear-gradient(180deg, #1b92ec 0%, #0876cc 100%);
            box-shadow: 0 14px 24px rgba(9, 132, 227, 0.24);
            transform: translateY(-1px);
        }

        button:active {
            transform: translateY(1px);
        }

        .login-tabs {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 5px;
            padding: 5px;
            margin: 0 0 24px;
            background: rgba(241, 245, 249, 0.76);
            border: 1px solid rgba(226, 232, 240, 0.9);
            border-radius: 999px;
        }

        .tab-button {
            height: 40px;
            margin: 0;
            border-radius: 999px;
            border: none;
            background: transparent;
            color: #7c8796;
            font-size: 14px;
            font-weight: 600;
            box-shadow: none;
        }

        .tab-button:hover {
            background: rgba(255, 255, 255, 0.62);
            color: #2d3436;
            box-shadow: none;
            transform: none;
        }

        .tab-button.active {
            background: rgba(255, 255, 255, 0.96);
            color: #0984e3;
            box-shadow: 0 8px 18px rgba(45, 52, 54, 0.08);
        }

        .login-panel {
            display: none;
        }

        .login-panel.active {
            display: block;
        }

        .passkey-button {
            width: 100%;
            height: 50px;
            margin: 0;
            border-radius: 12px;
            background: linear-gradient(180deg, #13ba86 0%, #0f9f71 100%);
            color: white;
            border: none;
            font-size: 15px;
            font-weight: 600;
            box-shadow: 0 10px 18px rgba(16, 185, 129, 0.16);
        }

        .passkey-button:hover {
            background: linear-gradient(180deg, #16c891 0%, #0f9f71 100%);
            box-shadow: 0 14px 24px rgba(16, 185, 129, 0.22);
        }

        .passkey-button:disabled {
            cursor: not-allowed;
            opacity: 0.65;
            transform: none;
        }

        .login-alert {
            display: none;
            margin: 0 0 15px;
            padding: 12px 13px;
            border-radius: 10px;
            font-size: 13px;
            line-height: 1.5;
        }

        .login-alert.is-error {
            background: #fff1f2;
            border: 1px solid #ffe4e6;
            color: #be123c;
        }

        .login-alert.is-info {
            background: #eff6ff;
            border: 1px solid #bfdbfe;
            color: #1d4ed8;
        }

        .two-factor-hint {
            margin-top: -2px;
        }

        .passkey-copy {
            margin: 0 0 16px;
            padding: 15px;
            border: 1px solid #dbe7f3;
            border-radius: 12px;
            background: rgba(248, 251, 255, 0.72);
            color: #475569;
            font-size: 14px;
            line-height: 1.6;
        }

        @media (max-width: 480px) {
            body {
                padding-top: 11vh;
            }

            .login-box {
                padding: 34px 24px 28px;
            }
        }
    </style>
</head>

<body>
    <div class="login-box">
        <div class="login-brand">
            <span class="login-brand-mark" aria-hidden="true">
                <svg width="17" height="17" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M6 19.5V5.8c0-.72.58-1.3 1.3-1.3h9.4c.72 0 1.3.58 1.3 1.3v13.7" stroke="white" stroke-width="1.9" stroke-linecap="round"/>
                    <path d="M9 8.5h6M9 12h6M9 15.5h3.5" stroke="white" stroke-width="1.9" stroke-linecap="round"/>
                </svg>
            </span>
            管理中心
        </div>
        <h2>后台登录</h2>
        <p class="login-subtitle">验证身份后，继续管理你的内容与站点。</p>
        <div class="login-tabs" role="tablist" aria-label="登录方式">
            <button type="button" class="tab-button active" id="passwordTab" data-tab="password" role="tab"
                aria-selected="true" aria-controls="passwordPanel">密码登录</button>
            <button type="button" class="tab-button" id="passkeyTab" data-tab="passkey" role="tab"
                aria-selected="false" aria-controls="passkeyPanel">通行密钥</button>
        </div>

        <div class="login-panel active" id="passwordPanel" role="tabpanel" aria-labelledby="passwordTab">
            <div class="login-alert{{if .ErrorMessage}} is-error{{end}}" id="passwordAlert"{{if .ErrorMessage}} style="display: block;"{{end}}>{{.ErrorMessage}}</div>
            <form method="POST" id="loginForm">
                <input type="text" name="username" placeholder="用户名" value="{{.Username}}" required>
                <input type="password" name="password" placeholder="密码" required>
                <button type="submit" id="loginButton">登录</button>
                <div class="two-factor-modal{{if .TwoFactorRequired}} active{{end}}" id="twoFactorModal" role="dialog" aria-modal="true" aria-labelledby="twoFactorTitle"{{if not .TwoFactorRequired}} aria-hidden="true"{{end}}>
                    <div class="two-factor-dialog">
                        <h3 id="twoFactorTitle">两步验证</h3>
                        <p id="twoFactorMessage">{{if .InfoMessage}}{{.InfoMessage}}{{else}}请输入 Google 验证器中的 6 位验证码。{{end}}</p>
                        <div class="two-factor-error" id="twoFactorError"></div>
                        <input type="hidden" name="totp_code" id="twoFactorCode">
                        <div class="two-factor-code" aria-label="Google 验证码">
                            <input type="text" class="two-factor-digit" inputmode="numeric" pattern="[0-9]" autocomplete="one-time-code" aria-label="验证码第 1 位">
                            <input type="text" class="two-factor-digit" inputmode="numeric" pattern="[0-9]" aria-label="验证码第 2 位">
                            <input type="text" class="two-factor-digit" inputmode="numeric" pattern="[0-9]" aria-label="验证码第 3 位">
                            <input type="text" class="two-factor-digit" inputmode="numeric" pattern="[0-9]" aria-label="验证码第 4 位">
                            <input type="text" class="two-factor-digit" inputmode="numeric" pattern="[0-9]" aria-label="验证码第 5 位">
                            <input type="text" class="two-factor-digit" inputmode="numeric" pattern="[0-9]" aria-label="验证码第 6 位">
                        </div>
                        <div class="two-factor-actions">
                            <button type="button" class="two-factor-cancel" id="twoFactorCancel">取消</button>
                        </div>
                    </div>
                </div>
            </form>
        </div>

        <div class="login-panel" id="passkeyPanel" role="tabpanel" aria-labelledby="passkeyTab">
            <div class="login-alert" id="passkeyAlert"></div>
            <div class="passkey-copy">使用已绑定的通行密钥登录后台，无需输入账号和密码。</div>
            <button type="button" class="passkey-button" id="passkeyLoginButton">使用通行密钥登录</button>
        </div>
    </div>
    <script>
        function base64urlToBuffer(value) {
            const base64 = String(value).replace(/-/g, '+').replace(/_/g, '/');
            const padded = base64.padEnd(base64.length + (4 - base64.length % 4) % 4, '=');
            const binary = atob(padded);
            const bytes = new Uint8Array(binary.length);
            for (let i = 0; i < binary.length; i++) {
                bytes[i] = binary.charCodeAt(i);
            }
            return bytes.buffer;
        }

        function bufferToBase64url(buffer) {
            const bytes = new Uint8Array(buffer);
            let binary = '';
            for (let i = 0; i < bytes.byteLength; i++) {
                binary += String.fromCharCode(bytes[i]);
            }
            return btoa(binary).replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/g, '');
        }

        function prepareAssertionOptions(options) {
            options.publicKey.challenge = base64urlToBuffer(options.publicKey.challenge);
            if (Array.isArray(options.publicKey.allowCredentials)) {
                options.publicKey.allowCredentials = options.publicKey.allowCredentials.map(function (item) {
                    item.id = base64urlToBuffer(item.id);
                    return item;
                });
            }
            return options;
        }

        function getPasskeyErrorMessage(error, fallback) {
            if (error && error.name === 'NotAllowedError') {
                return '已取消通行密钥验证。';
            }
            if (error && typeof error.message === 'string') {
                return error.message;
            }
            return fallback;
        }

        function showAlert(alertBox, message, type) {
            alertBox.textContent = message;
            alertBox.classList.remove('is-error', 'is-info');
            alertBox.classList.add(type === 'info' ? 'is-info' : 'is-error');
            alertBox.style.display = 'block';
        }

        function hideAlert(alertBox) {
            alertBox.style.display = 'none';
            alertBox.classList.remove('is-error', 'is-info');
        }

        function showTwoFactorModal(message, isError) {
            const modal = document.getElementById('twoFactorModal');
            const errorBox = document.getElementById('twoFactorError');
            document.getElementById('twoFactorMessage').textContent = isError ? '请输入 Google 验证器中的 6 位验证码。' : (message || '请输入 Google 验证器中的 6 位验证码。');
            errorBox.textContent = isError ? message : '';
            errorBox.style.display = isError ? 'block' : 'none';
            modal.classList.add('active');
            modal.setAttribute('aria-hidden', 'false');
            document.querySelectorAll('.two-factor-digit').forEach(function (digit) {
                digit.required = true;
            });
            document.querySelector('.two-factor-digit').focus();
        }

        function hideTwoFactorModal() {
            const modal = document.getElementById('twoFactorModal');
            const code = document.getElementById('twoFactorCode');
            modal.classList.remove('active');
            modal.setAttribute('aria-hidden', 'true');
            code.value = '';
            document.querySelectorAll('.two-factor-digit').forEach(function (digit) {
                digit.required = false;
                digit.value = '';
            });
        }

        let twoFactorSubmitInProgress = false;

        function submitTwoFactorCode() {
            if (twoFactorSubmitInProgress || !/^\d{6}$/.test(document.getElementById('twoFactorCode').value)) {
                return;
            }
            twoFactorSubmitInProgress = true;
            document.getElementById('loginForm').requestSubmit();
        }

        function setTwoFactorDigits(value) {
            const digits = String(value).replace(/\D/g, '').slice(0, 6);
            const inputs = document.querySelectorAll('.two-factor-digit');
            inputs.forEach(function (input, index) {
                input.value = digits[index] || '';
            });
            document.getElementById('twoFactorCode').value = digits;
            return digits.length;
        }

        function syncTwoFactorCode() {
            const code = Array.from(document.querySelectorAll('.two-factor-digit')).map(function (input) {
                return input.value;
            }).join('');
            document.getElementById('twoFactorCode').value = code;
            return code.length;
        }

        async function finishPasskeyLogin(options, challenge) {
            if (!window.PublicKeyCredential) {
                throw new Error('当前浏览器不支持通行密钥。');
            }
            const assertion = await navigator.credentials.get(prepareAssertionOptions(options));
            const verifyResp = await fetch('{{adminPath}}/login/passkey?challenge=' + encodeURIComponent(challenge), {
                method: 'POST',
                headers: {
                    'Accept': 'application/json',
                    'Content-Type': 'application/json',
                    'X-Requested-With': 'XMLHttpRequest'
                },
                body: JSON.stringify(assertionToJSON(assertion))
            });
            const verifyData = await verifyResp.json();
            if (!verifyData.success) {
                throw new Error(verifyData.message || '通行密钥验证失败。');
            }
            window.location.href = verifyData.redirect || '{{adminPath}}/dashboard';
        }

        function assertionToJSON(assertion) {
            const response = {
                authenticatorData: bufferToBase64url(assertion.response.authenticatorData),
                clientDataJSON: bufferToBase64url(assertion.response.clientDataJSON),
                signature: bufferToBase64url(assertion.response.signature)
            };
            if (assertion.response.userHandle) {
                response.userHandle = bufferToBase64url(assertion.response.userHandle);
            }
            return {
                id: assertion.id,
                rawId: bufferToBase64url(assertion.rawId),
                type: assertion.type,
                response: response
            };
        }

        document.getElementById('loginForm').addEventListener('submit', async function (event) {
            event.preventDefault();
            const form = event.currentTarget;
            const button = document.getElementById('loginButton');
            const alertBox = document.getElementById('passwordAlert');
            hideAlert(alertBox);
            button.disabled = true;
            button.textContent = '正在验证...';
            try {
                const loginResp = await fetch(form.action || window.location.href, {
                    method: 'POST',
                    headers: {
                        'Accept': 'application/json',
                        'X-Requested-With': 'XMLHttpRequest'
                    },
                    body: new FormData(form)
                });
                const loginData = await loginResp.json();
                if (loginData.success) {
                    window.location.href = loginData.redirect || '{{adminPath}}/dashboard';
                    return;
                }
                if (loginData.twoFactorRequired) {
                    const codeWasSubmitted = twoFactorSubmitInProgress;
                    twoFactorSubmitInProgress = false;
                    if (codeWasSubmitted) {
                        setTwoFactorDigits('');
                    }
                    showTwoFactorModal(loginData.message, codeWasSubmitted);
                    button.disabled = false;
                    button.textContent = '登录';
                    return;
                }
                throw new Error(loginData.message || '登录失败，请重新输入。');
            } catch (error) {
                twoFactorSubmitInProgress = false;
                showAlert(alertBox, error.message || '登录失败，请重新输入。', 'error');
                button.disabled = false;
                button.textContent = '登录';
            }
        });

        document.getElementById('twoFactorCancel').addEventListener('click', hideTwoFactorModal);

        document.addEventListener('paste', function (event) {
            const modal = document.getElementById('twoFactorModal');
            if (!modal.classList.contains('active')) {
                return;
            }
            event.preventDefault();
            event.stopPropagation();
            const digits = event.clipboardData ? event.clipboardData.getData('text') : '';
            const length = setTwoFactorDigits(digits);
            const inputs = document.querySelectorAll('.two-factor-digit');
            inputs[Math.min(length, inputs.length - 1)].focus();
            submitTwoFactorCode();
        }, true);

        document.querySelectorAll('.two-factor-digit').forEach(function (input, index, inputs) {
            input.addEventListener('input', function () {
                const digits = input.value.replace(/\D/g, '');
                if (digits.length > 1) {
                    const length = setTwoFactorDigits(digits);
                    inputs[Math.min(length, inputs.length - 1)].focus();
                    submitTwoFactorCode();
                    return;
                }
                input.value = digits;
                syncTwoFactorCode();
                if (input.value && index < inputs.length - 1) {
                    inputs[index + 1].focus();
                }
                submitTwoFactorCode();
            });
            input.addEventListener('keydown', function (event) {
                if (event.key === 'Backspace' && !input.value && index > 0) {
                    inputs[index - 1].focus();
                }
            });
        });

        if (document.getElementById('twoFactorModal').classList.contains('active')) {
            showTwoFactorModal(document.getElementById('twoFactorMessage').textContent);
        }

        let passkeyLoginInProgress = false;

        async function startPasskeyLogin() {
            if (passkeyLoginInProgress) {
                return;
            }
            const button = document.getElementById('passkeyLoginButton');
            const alertBox = document.getElementById('passkeyAlert');
            alertBox.style.display = 'none';
            passkeyLoginInProgress = true;
            button.disabled = true;
            const originalContent = button.textContent;
            button.textContent = '等待通行密钥...';
            try {
                const beginResp = await fetch('{{adminPath}}/login/passkey/options', {
                    method: 'POST',
                    headers: {
                        'Accept': 'application/json',
                        'X-Requested-With': 'XMLHttpRequest'
                    }
                });
                const beginData = await beginResp.json();
                if (!beginData.success) {
                    throw new Error(beginData.message || '通行密钥验证初始化失败。');
                }
                await finishPasskeyLogin(beginData.options, beginData.challenge);
            } catch (error) {
                showAlert(alertBox, getPasskeyErrorMessage(error, '通行密钥登录失败。'), 'error');
                button.disabled = false;
                button.textContent = originalContent;
                passkeyLoginInProgress = false;
            }
        }

        document.querySelectorAll('.tab-button').forEach(function (tab) {
            tab.addEventListener('click', function () {
                const target = tab.dataset.tab;
                document.querySelectorAll('.tab-button').forEach(function (item) {
                    const active = item.dataset.tab === target;
                    item.classList.toggle('active', active);
                    item.setAttribute('aria-selected', active ? 'true' : 'false');
                });
                document.getElementById('passwordPanel').classList.toggle('active', target === 'password');
                document.getElementById('passkeyPanel').classList.toggle('active', target === 'passkey');
                document.getElementById('passwordAlert').style.display = 'none';
                document.getElementById('passkeyAlert').style.display = 'none';
                if (target === 'passkey') {
                    startPasskeyLogin();
                }
            });
        });

        document.getElementById('passkeyLoginButton').addEventListener('click', startPasskeyLogin);
    </script>
</body>

</html>
