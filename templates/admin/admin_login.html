<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>后台登录</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background:
                radial-gradient(circle at 50% 0%, rgba(9, 132, 227, 0.11), transparent 34%),
                linear-gradient(180deg, #f6f9fc 0%, #eef4f8 100%);
            display: flex;
            align-items: flex-start;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 15vh 20px 40px;
            color: #2d3436;
        }

        .login-box {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(14px);
            padding: 36px 34px 34px;
            border-radius: 16px;
            box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1), 0 10px 10px -5px rgb(0 0 0 / 0.04), 0 0 0 1px rgba(255, 255, 255, 0.72) inset;
            border: 1px solid rgba(148, 163, 184, 0.18);
            width: 360px;
            max-width: 100%;
        }

        h2 {
            text-align: center;
            color: #2d3436;
            font-size: 24px;
            font-weight: 700;
            line-height: 1.2;
            margin: 0 0 28px;
        }

        input {
            width: 100%;
            height: 48px;
            padding: 0 15px 0 43px;
            margin: 0 0 15px;
            border: 1px solid #d9e1ea;
            border-radius: 10px;
            background-color: rgba(248, 250, 252, 0.72);
            background-position: 15px 50%;
            background-repeat: no-repeat;
            background-size: 16px 16px;
            color: #2d3436;
            font-size: 15px;
            outline: none;
            transition: border-color 0.2s ease, box-shadow 0.2s ease, background-color 0.2s ease;
        }

        input[name="username"] {
            background-image: url("data:image/svg+xml,%3Csvg width='16' height='16' viewBox='0 0 24 24' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M20 21a8 8 0 0 0-16 0' stroke='%2394A3B8' stroke-width='1.8' stroke-linecap='round'/%3E%3Ccircle cx='12' cy='7' r='4' stroke='%2394A3B8' stroke-width='1.8'/%3E%3C/svg%3E");
        }

        input[name="password"] {
            background-image: url("data:image/svg+xml,%3Csvg width='16' height='16' viewBox='0 0 24 24' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Crect x='5' y='10' width='14' height='10' rx='2' stroke='%2394A3B8' stroke-width='1.8'/%3E%3Cpath d='M8 10V7a4 4 0 0 1 8 0v3' stroke='%2394A3B8' stroke-width='1.8' stroke-linecap='round'/%3E%3Cpath d='M12 14v2' stroke='%2394A3B8' stroke-width='1.8' stroke-linecap='round'/%3E%3C/svg%3E");
        }

        input:focus {
            background-color: #fff;
            border-color: #0984e3;
            box-shadow: 0 0 0 4px rgba(9, 132, 227, 0.1);
        }

        input::placeholder {
            color: #94a3b8;
        }

        button {
            width: 100%;
            height: 46px;
            margin-top: 5px;
            background: linear-gradient(180deg, #1688df 0%, #0876cc 100%);
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 15px;
            font-weight: 600;
            transition: background 0.2s ease, transform 0.2s ease, box-shadow 0.2s ease, opacity 0.2s ease;
            box-shadow: 0 10px 18px rgba(9, 132, 227, 0.18);
        }

        button:hover {
            background: linear-gradient(180deg, #1b92ec 0%, #0876cc 100%);
            box-shadow: 0 14px 24px rgba(9, 132, 227, 0.24);
            transform: translateY(-1px);
        }

        button:active {
            transform: translateY(1px);
        }

        .login-tabs {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 5px;
            padding: 5px;
            margin: 0 0 20px;
            background: rgba(241, 245, 249, 0.76);
            border: 1px solid rgba(226, 232, 240, 0.9);
            border-radius: 999px;
        }

        .tab-button {
            height: 38px;
            margin: 0;
            border-radius: 999px;
            border: none;
            background: transparent;
            color: #7c8796;
            font-size: 14px;
            font-weight: 600;
            box-shadow: none;
        }

        .tab-button:hover {
            background: rgba(255, 255, 255, 0.62);
            color: #2d3436;
            box-shadow: none;
            transform: none;
        }

        .tab-button.active {
            background: rgba(255, 255, 255, 0.96);
            color: #0984e3;
            box-shadow: 0 8px 18px rgba(45, 52, 54, 0.08);
        }

        .login-panel {
            display: none;
        }

        .login-panel.active {
            display: block;
        }

        .passkey-button {
            width: 100%;
            height: 46px;
            margin: 0;
            border-radius: 10px;
            background: linear-gradient(180deg, #13ba86 0%, #0f9f71 100%);
            color: white;
            border: none;
            font-size: 15px;
            font-weight: 600;
            box-shadow: 0 10px 18px rgba(16, 185, 129, 0.16);
        }

        .passkey-button:hover {
            background: linear-gradient(180deg, #16c891 0%, #0f9f71 100%);
            box-shadow: 0 14px 24px rgba(16, 185, 129, 0.22);
        }

        .passkey-button:disabled {
            cursor: not-allowed;
            opacity: 0.65;
            transform: none;
        }

        .login-alert {
            display: none;
            margin: 0 0 15px;
            padding: 12px 13px;
            border-radius: 10px;
            background: #fff1f2;
            border: 1px solid #ffe4e6;
            color: #be123c;
            font-size: 13px;
            line-height: 1.5;
        }

        .passkey-copy {
            margin: 0 0 16px;
            padding: 15px;
            border: 1px solid #dbe7f3;
            border-radius: 12px;
            background: rgba(248, 251, 255, 0.72);
            color: #475569;
            font-size: 14px;
            line-height: 1.6;
        }

        @media (max-width: 480px) {
            body {
                padding-top: 11vh;
            }

            .login-box {
                padding: 30px 24px 26px;
            }
        }
    </style>
</head>

<body>
    <div class="login-box">
        <h2>后台登录</h2>
        <div class="login-tabs" role="tablist" aria-label="登录方式">
            <button type="button" class="tab-button active" id="passwordTab" data-tab="password" role="tab"
                aria-selected="true" aria-controls="passwordPanel">密码登录</button>
            <button type="button" class="tab-button" id="passkeyTab" data-tab="passkey" role="tab"
                aria-selected="false" aria-controls="passkeyPanel">通行密钥</button>
        </div>

        <div class="login-panel active" id="passwordPanel" role="tabpanel" aria-labelledby="passwordTab">
            <div class="login-alert" id="passwordAlert"></div>
            <form method="POST" id="loginForm">
                <input type="text" name="username" placeholder="用户名" required>
                <input type="password" name="password" placeholder="密码" required>
                <button type="submit" id="loginButton">登录</button>
            </form>
        </div>

        <div class="login-panel" id="passkeyPanel" role="tabpanel" aria-labelledby="passkeyTab">
            <div class="login-alert" id="passkeyAlert"></div>
            <div class="passkey-copy">使用已绑定的通行密钥登录后台，无需输入账号和密码。</div>
            <button type="button" class="passkey-button" id="passkeyLoginButton">使用通行密钥登录</button>
        </div>
    </div>
    <script>
        function base64urlToBuffer(value) {
            const base64 = String(value).replace(/-/g, '+').replace(/_/g, '/');
            const padded = base64.padEnd(base64.length + (4 - base64.length % 4) % 4, '=');
            const binary = atob(padded);
            const bytes = new Uint8Array(binary.length);
            for (let i = 0; i < binary.length; i++) {
                bytes[i] = binary.charCodeAt(i);
            }
            return bytes.buffer;
        }

        function bufferToBase64url(buffer) {
            const bytes = new Uint8Array(buffer);
            let binary = '';
            for (let i = 0; i < bytes.byteLength; i++) {
                binary += String.fromCharCode(bytes[i]);
            }
            return btoa(binary).replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/g, '');
        }

        function prepareAssertionOptions(options) {
            options.publicKey.challenge = base64urlToBuffer(options.publicKey.challenge);
            if (Array.isArray(options.publicKey.allowCredentials)) {
                options.publicKey.allowCredentials = options.publicKey.allowCredentials.map(function (item) {
                    item.id = base64urlToBuffer(item.id);
                    return item;
                });
            }
            return options;
        }

        async function finishPasskeyLogin(options, challenge) {
            if (!window.PublicKeyCredential) {
                throw new Error('当前浏览器不支持通行密钥。');
            }
            const assertion = await navigator.credentials.get(prepareAssertionOptions(options));
            const verifyResp = await fetch('{{adminPath}}/login/passkey?challenge=' + encodeURIComponent(challenge), {
                method: 'POST',
                headers: {
                    'Accept': 'application/json',
                    'Content-Type': 'application/json',
                    'X-Requested-With': 'XMLHttpRequest'
                },
                body: JSON.stringify(assertionToJSON(assertion))
            });
            const verifyData = await verifyResp.json();
            if (!verifyData.success) {
                throw new Error(verifyData.message || '通行密钥验证失败。');
            }
            window.location.href = verifyData.redirect || '{{adminPath}}/dashboard';
        }

        function assertionToJSON(assertion) {
            const response = {
                authenticatorData: bufferToBase64url(assertion.response.authenticatorData),
                clientDataJSON: bufferToBase64url(assertion.response.clientDataJSON),
                signature: bufferToBase64url(assertion.response.signature)
            };
            if (assertion.response.userHandle) {
                response.userHandle = bufferToBase64url(assertion.response.userHandle);
            }
            return {
                id: assertion.id,
                rawId: bufferToBase64url(assertion.rawId),
                type: assertion.type,
                response: response
            };
        }

        document.getElementById('loginForm').addEventListener('submit', async function (event) {
            event.preventDefault();
            const form = event.currentTarget;
            const button = document.getElementById('loginButton');
            const alertBox = document.getElementById('passwordAlert');
            alertBox.style.display = 'none';
            button.disabled = true;
            button.textContent = '正在验证...';
            try {
                const loginResp = await fetch(form.action || window.location.href, {
                    method: 'POST',
                    headers: {
                        'Accept': 'application/json',
                        'X-Requested-With': 'XMLHttpRequest'
                    },
                    body: new FormData(form)
                });
                const loginData = await loginResp.json();
                if (loginData.success) {
                    window.location.href = loginData.redirect || '{{adminPath}}/dashboard';
                    return;
                }
                throw new Error(loginData.message || '登录失败，请重新输入。');
            } catch (error) {
                alertBox.textContent = error.message || '登录失败，请重新输入。';
                alertBox.style.display = 'block';
                button.disabled = false;
                button.textContent = '登录';
            }
        });

        document.querySelectorAll('.tab-button').forEach(function (tab) {
            tab.addEventListener('click', function () {
                const target = tab.dataset.tab;
                document.querySelectorAll('.tab-button').forEach(function (item) {
                    const active = item.dataset.tab === target;
                    item.classList.toggle('active', active);
                    item.setAttribute('aria-selected', active ? 'true' : 'false');
                });
                document.getElementById('passwordPanel').classList.toggle('active', target === 'password');
                document.getElementById('passkeyPanel').classList.toggle('active', target === 'passkey');
                document.getElementById('passwordAlert').style.display = 'none';
                document.getElementById('passkeyAlert').style.display = 'none';
            });
        });

        document.getElementById('passkeyLoginButton').addEventListener('click', async function () {
            const button = document.getElementById('passkeyLoginButton');
            const alertBox = document.getElementById('passkeyAlert');
            alertBox.style.display = 'none';
            button.disabled = true;
            const originalContent = button.textContent;
            button.textContent = '等待通行密钥...';
            try {
                const beginResp = await fetch('{{adminPath}}/login/passkey/options', {
                    method: 'POST',
                    headers: {
                        'Accept': 'application/json',
                        'X-Requested-With': 'XMLHttpRequest'
                    }
                });
                const beginData = await beginResp.json();
                if (!beginData.success) {
                    throw new Error(beginData.message || '通行密钥验证初始化失败。');
                }
                await finishPasskeyLogin(beginData.options, beginData.challenge);
            } catch (error) {
                alertBox.textContent = error.message || '通行密钥登录失败。';
                alertBox.style.display = 'block';
                button.disabled = false;
                button.textContent = originalContent;
            }
        });
    </script>
</body>

</html>
