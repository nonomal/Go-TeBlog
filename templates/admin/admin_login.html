<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>后台登录</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background:
                linear-gradient(180deg, #eef6fc 0%, #f8fafc 48%, #f3f4f6 100%);
            display: flex;
            align-items: flex-start;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 15vh 20px 40px;
            color: #2d3436;
        }

        .login-box {
            background: rgba(255, 255, 255, 0.96);
            padding: 34px 32px 32px;
            border-radius: 8px;
            box-shadow: 0 18px 48px rgba(45, 52, 54, 0.12);
            border: 1px solid rgba(148, 163, 184, 0.22);
            width: 360px;
            max-width: 100%;
        }

        h2 {
            text-align: center;
            color: #2d3436;
            font-size: 24px;
            font-weight: 700;
            line-height: 1.2;
            margin: 0 0 28px;
        }

        input {
            width: 100%;
            height: 44px;
            padding: 0 13px;
            margin: 0 0 14px;
            border: 1px solid #d8dee8;
            border-radius: 4px;
            background: #f8fafc;
            color: #2d3436;
            font-size: 15px;
            outline: none;
            transition: border-color 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
        }

        input:focus {
            background: #fff;
            border-color: #0984e3;
            box-shadow: 0 0 0 3px rgba(9, 132, 227, 0.12);
        }

        input::placeholder {
            color: #94a3b8;
        }

        button {
            width: 100%;
            height: 44px;
            margin-top: 4px;
            background: #0984e3;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 15px;
            font-weight: 600;
            transition: background 0.2s ease, transform 0.2s ease, box-shadow 0.2s ease;
        }

        button:hover {
            background: #0876cc;
            box-shadow: 0 8px 18px rgba(9, 132, 227, 0.2);
        }

        button:active {
            transform: translateY(1px);
        }

        @media (max-width: 480px) {
            body {
                padding-top: 11vh;
            }

            .login-box {
                padding: 28px 22px 24px;
            }
        }
    </style>
</head>

<body>
    <div class="login-box">
        <h2>后台登录</h2>
        <form method="POST">
            <input type="text" name="username" placeholder="用户名" required>
            <input type="password" name="password" placeholder="密码" required>
            <button type="submit">进入后台</button>
        </form>
    </div>
</body>

</html>
