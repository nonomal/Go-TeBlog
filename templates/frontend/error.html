<!DOCTYPE HTML>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="renderer" content="webkit">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
    <script>
        (function () {
            try {
                var mode = localStorage.getItem('blog-theme-mode') || 'light';
                var prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
                var theme = mode === 'dark' ? 'dark' : (mode === 'light' ? 'light' : (prefersDark ? 'dark' : 'light'));
                document.documentElement.setAttribute('data-theme-mode', mode);
                document.documentElement.setAttribute('data-theme', theme);
            } catch (e) {
                document.documentElement.setAttribute('data-theme-mode', 'light');
                document.documentElement.setAttribute('data-theme', 'light');
            }
        })();
    </script>
    <title>错误提示 - {{.Site.Title}}</title>
    <link rel="stylesheet" href="{{.Site.ThemeBase}}/normalize.css">
    <link rel="stylesheet" href="{{.Site.ThemeBase}}/grid.css">
    <link rel="stylesheet" href="{{.Site.ThemeBase}}/style.css">
    <link rel="stylesheet" href="{{.Site.ThemeBase}}/go-custom.css">
    <link rel="stylesheet" href="{{.Site.ThemeBase}}/css/font-awesome.min.css">
    <style>
        :root {
            --primary-color: {{.Site.Skin.PrimaryColor}};
            --primary-hover: {{.Site.Skin.PrimaryHover}};
            --success-color: {{.Site.Skin.SuccessColor}};
            --text-primary: {{.Site.Skin.TextPrimary}};
            --text-secondary: {{.Site.Skin.TextSecondary}};
            --text-muted: {{.Site.Skin.TextMuted}};
            --bg-primary: {{.Site.Skin.BgPrimary}};
            --bg-secondary: {{.Site.Skin.BgSecondary}};
            --bg-accent: {{.Site.Skin.BgAccent}};
            --border-light: {{.Site.Skin.BorderLight}};
            --header-bg: {{.Site.Skin.HeaderBg}};
            --theme-btn-hover-bg: {{.Site.Skin.ThemeBtnHoverBg}};
            --theme-btn-active-bg: {{.Site.Skin.ThemeBtnActiveBg}};
            --radius: {{.Site.Skin.Radius}};
        }
    </style>
    <style>
        .error-container {
            text-align: center;
            padding: 60px 20px;
        }

        .error-icon {
            font-size: 48px;
            color: #ef4444;
            margin-bottom: 20px;
        }

        .error-title {
            font-size: 24px;
            color: var(--text-primary);
            margin-bottom: 10px;
        }

        .error-message {
            font-size: 16px;
            color: var(--text-secondary);
            margin-bottom: 30px;
            line-height: 1.6;
        }

        .back-button {
            display: inline-block;
            padding: 12px 24px;
            background: var(--primary-color);
            color: white;
            text-decoration: none;
            border-radius: 6px;
            transition: background 0.3s;
        }

        .back-button:hover {
            background: var(--primary-hover);
        }

        :root[data-theme='dark'] .error-icon {
            color: #f87171;
        }
    </style>
</head>

<body>

    <header id="header" class="clearfix">
        <div class="container">
            <div class="site-header">
                <div class="site-name">
                    <!-- 留空 -->
                </div>
                <div class="site-search">
                    <form id="search" method="post" action="/blog/" role="search">
                        <label for="s" class="sr-only">搜索关键字</label>
                        <input type="text" id="s" name="s" class="text" placeholder="输入关键字搜索" />
                        <button type="submit" class="submit">搜索</button>
                    </form>
                </div>
                <button class="mobile-menu-toggle">
                    <span class="hamburger"></span>
                </button>
            </div>
            <div class="header-nav-row">
                <nav id="nav-menu" class="clearfix" role="navigation">
                    <a href="/blog">博客首页</a>
                </nav>
                <div class="nav-theme">
                    <button type="button" class="theme-mode-cycle" aria-label="显示模式" title="显示模式">
                        <i class="fas fa-sun" aria-hidden="true"></i>
                    </button>
                </div>
            </div>
        </div>
    </header>

    <div id="body">
        <div class="container">
            <div class="row">
                <div class="col-mb-12 col-12" id="main" role="main">
                    <div class="error-container">
                        <div class="error-icon">
                            {{if or (contains .ErrorTitle "成功") (contains .ErrorTitle "提交")}}
                            <i class="fas fa-check-circle" style="color: var(--success-color);"></i>
                            {{else}}
                            <i class="fas fa-exclamation-triangle"></i>
                            {{end}}
                        </div>
                        <h2 class="error-title">{{.ErrorTitle}}</h2>
                        <p class="error-message">{{.ErrorMessage}}</p>
                        <a href="javascript:history.back()" class="back-button">
                            <i class="fas fa-arrow-left"></i> 返回上一页
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <footer id="footer" role="contentinfo">
        <div class="footer-branding">
            <div>&copy; {{now.Format "2006"}} <a href="https://github.com/lyessure/Go-TeBlog" target="_blank"
                    class="go-badge" style="text-decoration: none;">⚡ Go-TeBlog</a></div>
            <div style="font-size: 11px; margin-top: 6px; opacity: 0.7;">Idea from Typecho</div>
        </div>
    </footer>

    <script src="{{.Site.ThemeBase}}/js/mobile-nav.js"></script>
    <script src="{{.Site.ThemeBase}}/js/theme-mode.js"></script>
</body>

</html>
